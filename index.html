<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev Detective — GitHub Case File Lookup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div class="corkboard">

    <header class="masthead">
      <p class="eyebrow">Case Intake — GitHub Records Division</p>
      <h1 class="masthead__title">Dev Detective</h1>
      <p class="masthead__subtitle">Hand over a username. We'll pull the file.</p>
    </header>

    <section class="intake" aria-label="Search">
      <form id="search-form" class="intake__form">
        <label for="username-input" class="visually-hidden">GitHub username</label>
        <input id="username-input" class="intake__input" type="text" placeholder="e.g. octocat" autocomplete="off"
          required />
        <button type="submit" class="btn btn--primary">Open File</button>
      </form>

      <button id="battle-toggle" type="button" class="btn btn--ghost">
        Switch to Battle Mode
      </button>
    </section>

    <!-- Single-suspect mode -->
    <section id="single-mode" class="mode-panel">
      <div id="single-status" class="status" hidden></div>
      <div id="single-result" class="result"></div>
    </section>

    <!-- Battle mode (two suspects, side by side) -->
    <section id="battle-mode" class="mode-panel" hidden>
      <form id="battle-form" class="intake__form intake__form--battle">
        <input id="battle-username-a" class="intake__input" type="text" placeholder="Suspect A" autocomplete="off"
          required />
        <span class="versus">VS</span>
        <input id="battle-username-b" class="intake__input" type="text" placeholder="Suspect B" autocomplete="off"
          required />
        <button type="submit" class="btn btn--primary">Compare Files</button>
      </form>

      <div id="battle-status" class="status" hidden></div>
      <div id="battle-result" class="battle-result"></div>
    </section>

  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dom.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
